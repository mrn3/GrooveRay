# Rate limiting zone for GrooveRay — include this inside the http { } block of your main nginx.conf.
# Bitnami: edit /opt/bitnami/nginx/conf/nginx.conf and add this line inside the http { } block:
#   include "/opt/bitnami/nginx/conf/server_blocks/grooveray-http-snippet.conf";
# Then create grooveray-http-snippet.conf with the contents below (or merge by hand).
#
# Standard nginx: add to /etc/nginx/nginx.conf inside http { }.

limit_req_zone $binary_remote_addr zone=grooveray:10m rate=200r/m;
